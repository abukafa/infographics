<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pustaka Grafis - Jaz Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="modules.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }
      .hero-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      }
      .card-hover:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      }
      /* Animasi Transisi Filter */
      .module-card {
        transition: all 0.4s ease-in-out;
      }
      .hidden-card {
        opacity: 0;
        transform: scale(0.95);
        pointer-events: none;
        display: none;
      }
      .badge-active {
        background-color: rgba(255, 255, 255, 0.2);
        border-color: white !important;
        font-weight: bold;
      }

      /* Custom Select Dropdown Styling */
      .custom-select-container {
        position: relative;
        z-index: 50;
      }

      .custom-select-trigger {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 0.75rem 1.25rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 1.25rem;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .custom-select-trigger:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      .custom-select-trigger:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.5);
      }

      .custom-select-options {
        position: absolute;
        top: calc(100% + 0.5rem);
        left: 0;
        right: 0;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1.25rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(20px);
        opacity: 0;
        transform: translateY(-10px) scale(0.95);
        pointer-events: none;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 60;
        overflow: hidden;
        padding: 0.375rem;
      }

      .custom-select-options.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      .custom-select-option {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.625rem 1rem;
        color: #94a3b8;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: 0.875rem;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .custom-select-option:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }

      .custom-select-option.selected {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
        font-weight: 600;
      }

      .chevron-icon {
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        color: rgba(255, 255, 255, 0.6);
      }

      .chevron-rotate {
        transform: rotate(180deg);
        color: #fff;
      }
    </style>
  </head>
  <body class="text-slate-800">
    <!-- Hero Section -->
    <header class="hero-gradient text-white py-16 px-6 shadow-lg">
      <div class="max-w-6xl mx-auto text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">
          Pustaka Grafis - Jaz Academy
        </h1>
        <p
          class="text-lg text-slate-300 max-w-2xl mx-auto font-light leading-relaxed"
        >
          Portal Belajar Visual. Pusat materi pembelajaran kreatif melalui
          Tampilan Visual yang sederhana untuk Generasi Digital.
        </p>

        <!-- Search & Filter Area -->
        <div class="mt-10 max-w-3xl mx-auto flex flex-col md:flex-row gap-4 items-stretch md:items-center">
          <!-- Custom Select Filter -->
          <div class="custom-select-container w-full md:w-72 shrink-0">
            <button id="category-select-trigger" class="custom-select-trigger focus:outline-none">
              <span id="selected-category-text" class="flex items-center gap-2">
                <i data-lucide="grid" class="w-4 h-4"></i>
                Semua Kategori
              </span>
              <i data-lucide="chevron-down" class="w-4 h-4 chevron-icon" id="select-chevron"></i>
            </button>
            <div id="category-select-options" class="custom-select-options">
              <!-- Dynamic options will render here -->
            </div>
          </div>

          <!-- Search Box -->
          <div class="relative flex-grow w-full">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"
            >
              <i data-lucide="search" class="w-5 h-5"></i>
            </span>
            <input
              type="text"
              id="search-input"
              onkeyup="runFilter()"
              placeholder="Cari judul materi atau penulis (misal: AI, Abu Kafa...)"
              class="w-full bg-white/10 border border-slate-500 text-white placeholder-slate-400 rounded-2xl py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white/20 transition-all"
            />
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto py-12 px-6">
      <div
        id="module-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
      >
        <!-- Dynamic Cards -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-20">
        <i
          data-lucide="search-x"
          class="mx-auto w-16 h-16 text-slate-300 mb-4"
        ></i>
        <p class="text-slate-500">
          Materi tidak ditemukan. Coba kata kunci lain ya!
        </p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-100 border-t border-slate-200 py-10 text-center">
      <p class="text-slate-500 text-sm font-medium">
        &copy; 2024 Jaz Academy - Pustaka Grafis Terpadu
      </p>
      <p class="text-slate-400 text-xs mt-1">
        Edukasi Menyenangkan Melalui Pendekatan Visual
      </p>
    </footer>

    <script>
      // Helper function to dynamically extract unique categories
      function getCategories(modules) {
        const uniqueCategories = new Set(modules.map(m => m.category));
        return ["all", ...Array.from(uniqueCategories)];
      }

      // Helper function to capitalize category names
      function formatCategoryLabel(catKey) {
        if (catKey === "all") return "Semua Kategori";
        return catKey.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
      }

      // Helper to get category icons with a fallback
      function getCategoryIcon(catKey) {
        const icons = {
          "all": "grid",
          "informatika": "cpu",
          "muamalah": "landmark",
          "tsaqofah": "book-open",
          "self-development": "sparkles"
        };
        return icons[catKey] || "folder";
      }

      // State Filter Global
      let activeCategory = "all";
      let allModules = [];

      // Render Modules Dynamic Cards
      function renderCards(cards) {
        const container = document.getElementById("module-container");
        container.innerHTML = "";

        cards.forEach((card) => {
          const cardEl = document.createElement("div");
          cardEl.className = "module-card";
          cardEl.setAttribute("data-category", card.category);

          // Color themes mapping
          let colorBg = "bg-blue-100";
          let colorText = "text-blue-600";
          let colorBadge = "text-blue-500";
          let borderHover = "hover:border-blue-500";

          if (card.color === "emerald") {
            colorBg = "bg-emerald-100";
            colorText = "text-emerald-600";
            colorBadge = "text-emerald-500";
            borderHover = "hover:border-emerald-500";
          } else if (card.color === "rose") {
            colorBg = "bg-rose-100";
            colorText = "text-rose-600";
            colorBadge = "text-rose-500";
            borderHover = "hover:border-rose-500";
          } else if (card.color === "orange") {
            colorBg = "bg-orange-100";
            colorText = "text-orange-600";
            colorBadge = "text-orange-500";
            borderHover = "hover:border-orange-500";
          } else if (card.color === "indigo") {
            colorBg = "bg-indigo-100";
            colorText = "text-indigo-600";
            colorBadge = "text-indigo-500";
            borderHover = "hover:border-indigo-500";
          } else if (card.color === "stone") {
            colorBg = "bg-stone-100";
            colorText = "text-stone-600";
            colorBadge = "text-stone-500";
            borderHover = "hover:border-stone-500";
          } else {
            colorBg = `bg-${card.color}-100`;
            colorText = `text-${card.color}-600`;
            colorBadge = `text-${card.color}-500`;
            borderHover = `hover:border-${card.color}-500`;
          }

          const catLabel = formatCategoryLabel(card.category);

          cardEl.innerHTML = `
            <a
              href="${card.path}"
              class="bg-white p-6 rounded-2xl border border-slate-200 card-hover transition-all duration-300 block h-full border-t-4 ${borderHover}"
            >
              <div
                class="w-12 h-12 ${colorBg} ${colorText} rounded-xl flex items-center justify-center mb-4"
              >
                <i data-lucide="${card.icon}"></i>
              </div>
              <span
                class="text-xs font-bold ${colorBadge} uppercase tracking-wider"
                >${catLabel}</span
              >
              <h3 class="text-xl font-bold text-slate-800 module-title mt-1">
                ${card.title}
              </h3>
              <p class="text-blue-500 text-xs mb-2 font-medium module-author opacity-0 h-0 w-0 overflow-hidden">
                ${card.author}
              </p>
              <p class="text-slate-500 text-xs mb-2 font-medium">
                ${card.author}
              </p>
              <p class="text-sm text-slate-650">
                ${card.description}
              </p>
            </a>
          `;
          container.appendChild(cardEl);
        });

        // Initialize dynamic Lucide icons
        lucide.createIcons();
      }

      // Populate custom select options
      function populateDropdown(modules) {
        const optionsContainer = document.getElementById("category-select-options");
        optionsContainer.innerHTML = "";

        // Get all unique categories dynamically
        const categories = getCategories(modules);

        // Count elements per category
        const counts = {};
        categories.forEach(cat => {
          counts[cat] = 0;
        });
        counts["all"] = modules.length;

        modules.forEach(m => {
          if (counts[m.category] !== undefined) {
            counts[m.category]++;
          }
        });

        categories.forEach(catKey => {
          const label = formatCategoryLabel(catKey);
          const iconName = getCategoryIcon(catKey);
          const count = counts[catKey];

          const optionEl = document.createElement("div");
          optionEl.className = `custom-select-option ${catKey === activeCategory ? 'selected' : ''}`;
          optionEl.setAttribute("data-value", catKey);
          optionEl.innerHTML = `
            <span class="flex items-center gap-2">
              <i data-lucide="${iconName}" class="w-4 h-4"></i>
              ${label}
            </span>
            <span class="text-xs px-2 py-0.5 bg-slate-800 text-slate-400 rounded-full font-semibold">${count}</span>
          `;

          optionEl.addEventListener("click", () => {
            setCategory(catKey);
          });

          optionsContainer.appendChild(optionEl);
        });

        lucide.createIcons();
      }

      // Set category state and update UI
      function setCategory(category) {
        activeCategory = category;

        // Update trigger text & icon
        const triggerText = document.getElementById("selected-category-text");
        const label = formatCategoryLabel(category);
        const iconName = getCategoryIcon(category);
        triggerText.innerHTML = `
          <i data-lucide="${iconName}" class="w-4 h-4"></i>
          ${label}
        `;

        // Update options selection
        const options = document.querySelectorAll(".custom-select-option");
        options.forEach(opt => {
          if (opt.getAttribute("data-value") === category) {
            opt.classList.add("selected");
          } else {
            opt.classList.remove("selected");
          }
        });

        closeDropdown();
        runFilter();
      }

      // Filter logic (combined select + search)
      function runFilter() {
        const searchText = document.getElementById("search-input").value.toLowerCase();
        const cards = document.querySelectorAll(".module-card");
        let visibleCount = 0;

        cards.forEach((card) => {
          const title = card.querySelector(".module-title").innerText.toLowerCase();
          const author = card.querySelector(".module-author").innerText.toLowerCase();
          const category = card.getAttribute("data-category");

          const categoryMatch = activeCategory === "all" || category === activeCategory;
          const searchMatch = title.includes(searchText) || author.includes(searchText);

          if (categoryMatch && searchMatch) {
            card.classList.remove("hidden-card");
            visibleCount++;
          } else {
            card.classList.add("hidden-card");
          }
        });

        const emptyState = document.getElementById("empty-state");
        if (visibleCount === 0) {
          emptyState.classList.remove("hidden");
        } else {
          emptyState.classList.add("hidden");
        }
      }

      // Dropdown toggle controls
      const selectTrigger = document.getElementById("category-select-trigger");
      const selectOptions = document.getElementById("category-select-options");
      const selectChevron = document.getElementById("select-chevron");

      selectTrigger.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = selectOptions.classList.contains("open");
        if (isOpen) {
          closeDropdown();
        } else {
          openDropdown();
        }
      });

      function openDropdown() {
        selectOptions.classList.add("open");
        selectChevron.classList.add("chevron-rotate");
      }

      function closeDropdown() {
        selectOptions.classList.remove("open");
        selectChevron.classList.remove("chevron-rotate");
      }

      document.addEventListener("click", () => {
        closeDropdown();
      });

      // Load dynamic modules from offline modules.js
      function init() {
        if (typeof modulesData !== "undefined") {
          allModules = modulesData;
          console.log("Loaded data from modules.js");
        } else {
          console.error("No module data available in modules.js!");
        }

        renderCards(allModules);
        populateDropdown(allModules);
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
